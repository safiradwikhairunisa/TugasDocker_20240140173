<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Mahasiswa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Form Input Mahasiswa</h1>
    <form th:action="@{/form}" th:object="${user}" method="post">
        <div class="form-group">
            <label for="nama">Nama:</label>
            <input type="text" id="nama" th:field="*{nama}" required>
        </div>
        <div class="form-group">
            <label for="nim">NIM:</label>
            <input type="text" id="nim" th:field="*{nim}" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}">
        </div>
        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <label><input type="radio" th:field="*{jenisKelamin}" value="Laki-laki" required> Laki-laki</label>
            <label><input type="radio" th:field="*{jenisKelamin}" value="Perempuan"> Perempuan</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
        <a th:href="@{/home}">Kembali ke Home</a>
    </form>
</div>
</body>
</html>
